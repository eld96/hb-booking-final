<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HB Booking</title>
<style>
body { font-family: Arial; padding:20px; }
input, select, button { margin:5px 0; padding:8px; width:100%; }
.card { border:1px solid #ddd; padding:10px; margin:5px 0; }
.approved { background:#d4edda; }
.pending { background:#fff3cd; }
.rejected { background:#f8d7da; }
</style>
</head>
<body>

<h2>Бронирование</h2>

<select id="room">
<option value="GO_3">Переговорная ГО (3 этаж)</option>
<option value="MINOR">Кабинет офис Минор</option>
</select>

<input type="date" id="date">
<input type="time" id="start">
<input type="time" id="end">
<input type="text" id="purpose" placeholder="Цель встречи">

<button onclick="send()">Отправить</button>

<hr>

<h3>Вход администратора</h3>
<input type="text" id="admin_login" placeholder="Логин">
<input type="password" id="admin_pass" placeholder="Пароль">
<button onclick="adminLogin()">Войти</button>

<hr>

<h3>Заявки</h3>
<div id="list"></div>

<script>
let isAdmin=false;

async function load(){
    const r = await fetch("/api/bookings");
    const data = await r.json();

    document.getElementById("list").innerHTML = data.map(b => `
        <div class="card ${b.status}">
            <b>${b.room_name}</b><br>
            ${b.date} ${b.start_time}-${b.end_time}<br>
            ${b.purpose}<br>
            Статус: <b>${b.status}</b>
            ${isAdmin && b.status==="pending" ? `
                <br>
                <button onclick="update(${b.id},'approved')">Подтвердить</button>
                <button onclick="update(${b.id},'rejected')">Отклонить</button>
            ` : ""}
        </div>
    `).join("");
}

async function send(){
    const payload={
        room_id:document.getElementById("room").value,
        date:document.getElementById("date").value,
        start_time:document.getElementById("start").value,
        end_time:document.getElementById("end").value,
        purpose:document.getElementById("purpose").value,
        user_id:"guest"
    };

    const r = await fetch("/api/bookings",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(payload)
    });

    if(r.status===409){
        alert("Конфликт времени");
        return;
    }

    if(!r.ok){
        alert("Ошибка отправки заявки");
        return;
    }

    load();
}

function adminLogin(){
    const pass=document.getElementById("admin_pass").value;
    if(pass==="1234"){ // временно локальная проверка
        isAdmin=true;
        alert("Вы администратор");
        load();
    }else{
        alert("Неверный пароль");
    }
}

async function update(id,status){
    const pass=document.getElementById("admin_pass").value;

    const r=await fetch(`/api/bookings/${id}/status`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            status:status,
            admin_password:pass
        })
    });

    if(!r.ok){
        alert("Ошибка подтверждения");
        return;
    }

    load();
}

load();
setInterval(load,5000);
</script>

</body>
</html>
